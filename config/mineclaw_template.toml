[server]
host = "127.0.0.1"
port = 18789

[llm]
provider = "openai"
api_key = "${OPENAI_API_KEY}"
base_url = "https://api.openai.com/v1"
model = "gpt-4o"
max_tokens = 2048
temperature = 0.7

# 文件系统工具配置（本地工具始终启用）
[filesystem]
# 最大读取字节数（默认 16KB）
max_read_bytes = 16384
# 允许访问的目录列表（空表示允许所有）
allowed_directories = [
    # "/path/to/workspace",
]

